<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldClock Pro — Smart Timezone Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body {
      font-family: var(--font-sans);
      background: #fdfdfc;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: var(--font-mono); }
    
    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.5;
      z-index: -1;
    }

    /* Card Hover Dynamics */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px -12px rgba(0,0,0,0.08);
      border-color: #e5e7eb;
    }

    /* Modal Animation */
    .modal { opacity: 0; pointer-events: none; transition: all 0.2s ease; }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-content { transform: scale(0.95) translateY(10px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .modal.active .modal-content { transform: scale(1) translateY(0); }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    
    .toast {
      transform: translateY(100%) translateX(-50%);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toast.show { transform: translateY(0) translateX(-50%); opacity: 1; }
  </style>
</head>
<body class="min-h-screen pb-24 text-slate-800">

  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200/60 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
        <h1 class="text-xl font-bold tracking-tight">WorldClock<span class="text-indigo-600">Pro</span></h1>
      </div>
      
      <div class="flex items-center gap-3">
        <button id="toggle-format" class="text-xs font-semibold px-3 py-1.5 rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors">
          Switch to 24h
        </button>
        <button onclick="openModal('modal-contact')" class="text-xs font-semibold px-4 py-1.5 rounded-md bg-indigo-600 text-white shadow-sm hover:bg-indigo-700 transition-colors flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Add Contact
        </button>
        <button onclick="openModal('modal-city')" class="text-xs font-semibold px-4 py-1.5 rounded-md border border-slate-200 bg-white hover:bg-slate-50 transition-colors flex items-center gap-1.5 shadow-sm">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
          Add City
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 pt-10">
    
    <section class="mb-12">
      <div class="flex items-center gap-2 mb-4">
        <h2 class="text-sm font-bold tracking-widest uppercase text-slate-400">Baseline (You)</h2>
      </div>
      <div class="glass-card rounded-2xl border border-indigo-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 relative overflow-hidden bg-gradient-to-br from-white to-indigo-50/30">
        <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 relative z-10">
          <div>
            <div id="local-zone-label" class="text-sm font-semibold text-indigo-600 mb-1"></div>
            <div id="local-time" class="mono text-5xl md:text-6xl font-bold tracking-tight text-slate-900 mb-2"></div>
            <div id="local-date" class="text-slate-500 font-medium"></div>

            <div class="mt-4 max-w-sm">
              <label for="local-zone-select" class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Your Time Zone</label>
              <input list="tz-list" id="local-zone-select" placeholder="Search city or timezone..." class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
            </div>
          </div>
          <div class="text-right hidden md:block">
            <div class="inline-flex items-center gap-2 bg-white border border-slate-200 rounded-full px-4 py-2 shadow-sm">
              <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
              <span class="text-xs font-bold text-slate-600 uppercase tracking-wide">Current Location</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="section-contacts" class="mb-12 hidden">
      <div class="flex items-center gap-2 mb-4">
        <h2 class="text-sm font-bold tracking-widest uppercase text-slate-400">Team & Clients</h2>
        <span class="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700 text-[10px] font-bold">Priority</span>
      </div>
      <div id="contacts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        </div>
    </section>

    <section>
      <div class="flex items-center gap-2 mb-4">
        <h2 class="text-sm font-bold tracking-widest uppercase text-slate-400">Tracked Cities</h2>
      </div>
      <div id="cities-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        </div>
    </section>

  </main>

  <div id="modal-contact" class="modal fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
    <div class="modal-content bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h3 class="font-bold text-slate-800">Add New Contact</h3>
        <button onclick="closeModal('modal-contact')" class="text-slate-400 hover:text-slate-600">✕</button>
      </div>
      <form id="form-contact" class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Name</label>
          <input type="text" id="c-name" required placeholder="e.g. Sarah from Design" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Time Zone</label>
          <input list="tz-list" id="c-tz" required placeholder="Search city or timezone..." class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Good Time (Start)</label>
            <input type="time" id="c-start" required value="09:00" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Good Time (End)</label>
            <input type="time" id="c-end" required value="18:00" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Memo (Optional)</label>
          <input type="text" id="c-memo" placeholder="e.g. Replies fast in the morning" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm" />
        </div>
        <div class="flex items-center gap-2 pt-2">
          <input type="checkbox" id="c-notif" checked class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500">
          <label for="c-notif" class="text-sm text-slate-600">Notify me when their window opens</label>
        </div>
        <div class="pt-4">
          <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-2.5 rounded-lg hover:bg-indigo-700 transition-colors">Save Contact</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-city" class="modal fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
    <div class="modal-content bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-slate-100 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h3 class="font-bold text-slate-800">Add Tracked City</h3>
        <button onclick="closeModal('modal-city')" class="text-slate-400 hover:text-slate-600">✕</button>
      </div>
      <form id="form-city" class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5 uppercase tracking-wide">Search Time Zone</label>
          <input list="tz-list" id="city-tz" required placeholder="e.g. Europe/Paris" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" />
        </div>
        <div class="pt-2">
          <button type="submit" class="w-full bg-slate-800 text-white font-semibold py-2.5 rounded-lg hover:bg-slate-900 transition-colors">Add City</button>
        </div>
      </form>
    </div>
  </div>

  <datalist id="tz-list"></datalist>

  <div id="toast" class="toast fixed bottom-8 left-1/2 z-50 flex items-center gap-2 bg-slate-800 text-white px-5 py-3 rounded-full shadow-lg font-medium text-sm">
    <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <span id="toast-msg">Copied to clipboard</span>
  </div>

  <script>
    // --- State Management ---
    let localZone = localStorage.getItem('wc_localZone') || Intl.DateTimeFormat().resolvedOptions().timeZone;
    let is24Hour = localStorage.getItem('wc_24h') === 'true';
    let cities = JSON.parse(localStorage.getItem('wc_cities')) || ['America/New_York', 'Europe/London', 'Asia/Tokyo'];
    let contacts = JSON.parse(localStorage.getItem('wc_contacts')) || [];
    let notifiedStates = {}; // Track notifications to avoid spam

    // --- DOM Elements ---
    const datalist = document.getElementById('tz-list');
    const localTimeEl = document.getElementById('local-time');
    const localDateEl = document.getElementById('local-date');
    const localZoneLabel = document.getElementById('local-zone-label');
    const localZoneSelect = document.getElementById('local-zone-select');
    const citiesGrid = document.getElementById('cities-grid');
    const contactsGrid = document.getElementById('contacts-grid');
    const sectionContacts = document.getElementById('section-contacts');
    const toastEl = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-msg');
    const toggleFormatBtn = document.getElementById('toggle-format');

    // --- Initialization ---
    function init() {
      // Populate Timezones
      const allZones = Intl.supportedValuesOf('timeZone');
      allZones.forEach(tz => {
        const option = document.createElement('option');
        option.value = tz;
        datalist.appendChild(option);
      });

      // UI Init
      localZoneLabel.textContent = formatZoneName(localZone);
      localZoneSelect.value = localZone;
      updateFormatBtnText();
      
      // Event Listeners
      toggleFormatBtn.addEventListener('click', () => {
        is24Hour = !is24Hour;
        localStorage.setItem('wc_24h', is24Hour);
        updateFormatBtnText();
        renderTick();
      });

      localZoneSelect.addEventListener('change', () => {
        if (allZones.includes(localZoneSelect.value)) {
          localZone = localZoneSelect.value;
          localStorage.setItem('wc_localZone', localZone);
          localZoneLabel.textContent = formatZoneName(localZone);
          renderTick();
        } else {
          showToast('Invalid timezone', true);
          localZoneSelect.value = localZone;
        }
      });

      document.getElementById('form-city').addEventListener('submit', (e) => {
        e.preventDefault();
        const tz = document.getElementById('city-tz').value;
        if (allZones.includes(tz) && !cities.includes(tz)) {
          cities.push(tz);
          saveData();
          closeModal('modal-city');
          document.getElementById('city-tz').value = '';
          renderTick();
        } else {
          showToast('Invalid or duplicate timezone', true);
        }
      });

      document.getElementById('form-contact').addEventListener('submit', (e) => {
        e.preventDefault();
        const tz = document.getElementById('c-tz').value;
        if (!allZones.includes(tz)) {
          showToast('Invalid timezone', true);
          return;
        }
        const newContact = {
          id: Date.now().toString(),
          name: document.getElementById('c-name').value,
          zone: tz,
          start: document.getElementById('c-start').value,
          end: document.getElementById('c-end').value,
          memo: document.getElementById('c-memo').value,
          notify: document.getElementById('c-notif').checked
        };
        contacts.push(newContact);
        saveData();
        closeModal('modal-contact');
        e.target.reset();
        renderTick();
        
        if (newContact.notify && Notification.permission !== "granted") {
          Notification.requestPermission();
        }
      });

      // Start Loop
      setInterval(renderTick, 1000);
      renderTick();
    }

    // --- Helpers ---
    function formatZoneName(zone) {
      return zone.replace(/_/g, ' ').split('/').pop();
    }

    function updateFormatBtnText() {
      toggleFormatBtn.textContent = is24Hour ? 'Switch to 12h' : 'Switch to 24h';
    }

    function saveData() {
      localStorage.setItem('wc_cities', JSON.stringify(cities));
      localStorage.setItem('wc_contacts', JSON.stringify(contacts));
    }

    function showToast(msg, isError = false) {
      toastMsg.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function removeCity(index) {
      cities.splice(index, 1);
      saveData();
      renderTick();
    }

    function removeContact(id) {
      contacts = contacts.filter(c => c.id !== id);
      saveData();
      renderTick();
    }

    // Modern Copy to Clipboard
    async function copyData(targetTimeStr, targetZone, targetDay) {
      const now = new Date();
      const localTimeStr = now.toLocaleTimeString('en-US', { hour12: !is24Hour, hour: 'numeric', minute: '2-digit' });
      const localDay = now.toLocaleDateString('en-US', { weekday: 'short' });
      const text = `${targetDay} ${targetTimeStr} in ${formatZoneName(targetZone)} / ${localDay} ${localTimeStr} your time`;
      
      try {
        await navigator.clipboard.writeText(text);
        showToast('Message copied!');
      } catch (err) {
        showToast('Failed to copy', true);
      }
    }

    // Semantic Time Status Logic
    function getCityStatus(dateObj) {
      const h = dateObj.getHours();
      const day = dateObj.getDay();
      const isWeekend = day === 0 || day === 6;

      if (isWeekend) {
        return { label: 'Weekend', bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700', dot: 'bg-purple-500' };
      }
      if (h >= 22 || h < 6) {
        return { label: 'Late Night', bg: 'bg-indigo-50', border: 'border-indigo-200', text: 'text-indigo-700', dot: 'bg-indigo-500' };
      }
      if (h >= 6 && h < 9) {
        return { label: 'Early Morning', bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', dot: 'bg-amber-500' };
      }
      if (h >= 12 && h < 13) {
        return { label: 'Lunch Time', bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-700', dot: 'bg-orange-500' };
      }
      if (h >= 9 && h < 18) {
        return { label: 'Working', bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-700', dot: 'bg-emerald-500' };
      }
      return { label: 'Evening', bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', dot: 'bg-blue-500' };
    }

    // Human-readable Difference
    function getReadableDiff(targetDate, localDate, targetZone) {
      const diffHours = Math.round((targetDate - localDate) / 3600000);
      const name = formatZoneName(targetZone);
      
      if (diffHours === 0) return `<span class="text-slate-500">Same time as you</span>`;
      if (diffHours > 0) return `<strong class="text-slate-800">${name}</strong> is ${diffHours} hours <strong class="text-slate-800">ahead</strong> of you`;
      return `<strong class="text-slate-800">${name}</strong> is ${Math.abs(diffHours)} hours <strong class="text-slate-800">behind</strong> you`;
    }

    // --- Core Render Engine ---
    function renderTick() {
      const now = new Date();
      const timeOpts = { hour12: !is24Hour, hour: 'numeric', minute: '2-digit', second: '2-digit' };
      const timeOptsNoSec = { hour12: !is24Hour, hour: 'numeric', minute: '2-digit' };
      const dateOpts = { weekday: 'long', month: 'long', day: 'numeric' };

      // Update Local
      const localNow = new Date(now.toLocaleString('en-US', { timeZone: localZone }));
      localTimeEl.textContent = localNow.toLocaleTimeString('en-US', timeOpts);
      localDateEl.textContent = localNow.toLocaleDateString('en-US', dateOpts);

      // Render Contacts
      if (contacts.length > 0) {
        sectionContacts.classList.remove('hidden');
        contactsGrid.innerHTML = contacts.map(contact => {
          const tDate = new Date(now.toLocaleString('en-US', { timeZone: contact.zone }));
          const tTimeStr = tDate.toLocaleTimeString('en-US', timeOptsNoSec);
          const tDay = tDate.toLocaleDateString('en-US', { weekday: 'short' });
          const lDate = new Date(now.toLocaleString('en-US', { timeZone: localZone }));
          
          const h = tDate.getHours();
          const m = tDate.getMinutes();
          const currentMins = h * 60 + m;
          
          const [sH, sM] = contact.start.split(':').map(Number);
          const [eH, eM] = contact.end.split(':').map(Number);
          const startMins = sH * 60 + sM;
          const endMins = eH * 60 + eM;
          
          let isGoodTime = false;
          if (startMins < endMins) {
            isGoodTime = currentMins >= startMins && currentMins < endMins;
          } else { // Crosses midnight
            isGoodTime = currentMins >= startMins || currentMins < endMins;
          }

          // Notification Logic
          const stateKey = `notif_${contact.id}_${now.toDateString()}`;
          if (isGoodTime && contact.notify && !notifiedStates[stateKey] && Notification.permission === "granted") {
            new Notification("Good time to message!", {
              body: `${contact.name} is now available (${tTimeStr} in ${formatZoneName(contact.zone)})`
            });
            notifiedStates[stateKey] = true;
          }

          const statusUI = isGoodTime 
            ? `<div class="bg-emerald-50 border border-emerald-200 text-emerald-700 px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-2 mt-3"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Good time to message</div>`
            : `<div class="bg-slate-50 border border-slate-200 text-slate-500 px-3 py-1.5 rounded-md text-xs font-medium flex items-center gap-2 mt-3">Not ideal time (Prefers ${contact.start}-${contact.end})</div>`;

          return `
            <div class="glass-card rounded-2xl border ${isGoodTime ? 'border-emerald-200 shadow-emerald-900/5' : 'border-slate-200'} p-5 relative group">
              <button onclick="removeContact('${contact.id}')" class="absolute top-3 right-3 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
              <div class="flex justify-between items-start mb-2">
                <div>
                  <h3 class="font-bold text-slate-900 text-lg">${contact.name}</h3>
                  <p class="text-[11px] font-semibold uppercase tracking-wide text-slate-400">${formatZoneName(contact.zone)} • ${tDay}</p>
                </div>
              </div>
              <div class="mono text-3xl font-bold text-slate-800 tracking-tight my-1">${tTimeStr}</div>
              ${contact.memo ? `<p class="text-xs text-slate-500 italic mt-1 mb-2">"${contact.memo}"</p>` : ''}
              ${statusUI}
              <div class="mt-4 pt-4 border-t border-slate-100">
                <button onclick="copyData('${tTimeStr}', '${contact.zone}', '${tDay}')" class="w-full text-xs font-semibold py-2 bg-slate-50 hover:bg-indigo-50 hover:text-indigo-600 text-slate-600 rounded-lg transition-colors border border-slate-200 border-dashed">
                  Copy Status to Clipboard
                </button>
              </div>
            </div>
          `;
        }).join('');
      } else {
        sectionContacts.classList.add('hidden');
      }

      // Render Standard Cities
      citiesGrid.innerHTML = cities.map((zone, i) => {
        const tDate = new Date(now.toLocaleString('en-US', { timeZone: zone }));
        const lDate = new Date(now.toLocaleString('en-US', { timeZone: localZone }));
        const tTimeStr = tDate.toLocaleTimeString('en-US', timeOptsNoSec);
        const tDay = tDate.toLocaleDateString('en-US', { weekday: 'short' });
        const dateStr = tDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        
        const st = getCityStatus(tDate);
        const diffHtml = getReadableDiff(tDate, lDate, zone);

        return `
          <div class="glass-card rounded-2xl border border-slate-200 p-5 relative group flex flex-col">
            <button onclick="removeCity(${i})" class="absolute top-3 right-3 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity z-10">✕</button>
            
            <div class="flex justify-between items-start mb-3">
              <div>
                <h3 class="font-bold text-slate-800 text-base leading-tight">${formatZoneName(zone)}</h3>
                <span class="text-xs font-medium text-slate-500">${tDay}, ${dateStr}</span>
              </div>
              <span class="inline-flex items-center gap-1.5 ${st.bg} ${st.border} ${st.text} border px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide">
                <span class="w-1.5 h-1.5 rounded-full ${st.dot}"></span>${st.label}
              </span>
            </div>
            
            <div class="mono text-4xl font-bold tracking-tight text-slate-900 mb-4">${tTimeStr}</div>
            
            <div class="mt-auto">
              <div class="text-[11px] text-slate-500 bg-slate-50 rounded p-2 mb-3 border border-slate-100">
                ${diffHtml}
              </div>
              <button onclick="copyData('${tTimeStr}', '${zone}', '${tDay}')" class="w-full py-2 bg-white border border-slate-200 shadow-sm rounded-lg text-xs font-semibold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all flex items-center justify-center gap-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy for message
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Run
    init();
  </script>
</body>
</html>
